<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Valen 💜</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020105; /* Fondo místico ultra oscuro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0; /* Empieza invisible hasta que hagan click */
            transition: opacity 2s ease;
        }
        
        /* Pantalla de inicio de la carta */
        .card-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 85%;
            max-width: 340px;
            padding: 30px 20px;
            background: rgba(138, 43, 226, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 20px;
            color: #ffffff;
            text-align: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.15);
            cursor: pointer;
            transition: all 1s ease;
        }

        /* Estilos del texto místico */
        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            margin: 0;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
            letter-spacing: 2px;
            line-height: 1.6;
            transition: all 0.8s ease;
        }

        /* Estilo para la frase sorpresa */
        .frase-oculta {
            display: none;
            font-size: 1.05rem;
            line-height: 1.7;
            color: #e0e0ff;
            animation: fadeInTexto 2.5s forwards;
        }

        @keyframes fadeInTexto {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card-overlay" id="interactive-card" onclick="revealMagic()">
        <h1 id="trigger-text">Haz click o toca la pantalla para que aparezca algo mágico.</h1>
        
        <div class="frase-oculta" id="secret-phrase">
            Cabello negro y un aroma ipso facto, silueta extravagante y una vibra de leopardo eso eres tú <strong>Valen <3</strong> 💜
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let magicActivated = false;

        // Función que activa todo el entorno visual al interactuar
        function revealMagic() {
            if (magicActivated) return; // Evita repetir la activación
            magicActivated = true;

            // Transición de la interfaz
            document.getElementById('trigger-text').style.display = 'none';
            document.getElementById('secret-phrase').style.display = 'block';
            
            const card = document.getElementById('interactive-card');
            card.style.pointerEvents = 'none'; // Deja interactuar con las partículas de fondo
            card.style.background = 'rgba(2, 1, 5, 0.55)';
            card.style.borderColor = 'rgba(138, 43, 226, 0.5)';
            card.style.boxShadow = '0 0 35px rgba(138, 43, 226, 0.4)';

            // Aparece el fondo 3D suavemente
            document.querySelector('canvas').style.opacity = '1';
        }

        // --- Configuración del Renderizador y Escena 3D ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020105, 0.006); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 100;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- Configuración de Partículas según el dispositivo ---
        const isMobile = window.innerWidth < 600;
        const heartCount = isMobile ? 1400 : 2800;
        const voidCount = isMobile ? 1100 : 2200;
        const totalParticles = heartCount + voidCount;

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(totalParticles * 3);
        const colors = new Float32Array(totalParticles * 3);
        const initialPositions = new Float32Array(totalParticles * 3); 

        // Paleta basada en Gojo y el corazón morado solicitado
        const colorPurpleGojo = new THREE.Color(0x8a2be2); // Púrpura dominante
        const colorCyanEyes = new THREE.Color(0x00ffff);   // Destellos azul cian
        const colorDeepPurple = new THREE.Color(0x4b0082); // Profundidad

        // --- Generación Matemática de Formas ---
        for (let i = 0; i < totalParticles; i++) {
            let x = 0, y = 0, z = 0;
            let pColor = colorPurpleGojo.clone();

            if (i < heartCount) {
                // Ecuación matemática del corazón
                const t = Math.random() * Math.PI * 2;
                x = 16 * Math.pow(Math.sin(t), 3);
                y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                z = (Math.random() - 0.5) * 7; 

                const scale = isMobile ? 1.0 : 1.3;
                x *= scale;
                y *= scale;
                z *= scale;

                // El corazón toma un tono morado brillante con destellos cian en los bordes
                pColor = colorPurpleGojo.clone().lerp(colorCyanEyes, Math.random() * 0.3);
            } else {
                // Anillos del Vacío Infinito que envuelven la escena
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 25 + (isMobile ? 32 : 42); 
                
                if (i % 2 === 0) {
                    x = Math.cos(angle) * radius;
                    y = Math.sin(angle) * radius;
                    z = (Math.random() - 0.5) * 12;
                } else {
                    x = Math.cos(angle) * radius;
                    z = Math.sin(angle) * radius;
                    y = (Math.random() - 0.5) * 12;
                }
                pColor = colorDeepPurple.clone().lerp(colorPurpleGojo, Math.random() * 0.6);
            }

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            initialPositions[i * 3] = x;
            initialPositions[i * 3 + 1] = y;
            initialPositions[i * 3 + 2] = z;

            colors[i * 3] = pColor.r;
            colors[i * 3 + 1] = pColor.g;
            colors[i * 3 + 2] = pColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: isMobile ? 1.3 : 1.9, 
            vertexColors: true,
            transparent: true,
            opacity: 0.95,
            blending: THREE.AdditiveBlending, 
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- Interactividad Táctil y Mouse ---
        let mouseX = 0, mouseY = 0;
        function onPointerMove(event) {
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            
            mouseX = (clientX - window.innerWidth / 2) * 0.03;
            mouseY = (clientY - window.innerHeight / 2) * 0.03;
        }
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('touchmove', onPointerMove, { passive: true });

        // --- Bucle de Animación ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const positionAttribute = geometry.attributes.position;

            // Solo animamos la física matemática si el usuario ya activó la carta
            if (magicActivated) {
                for (let i = 0; i < totalParticles; i++) {
                    let x = initialPositions[i * 3];
                    let y = initialPositions[i * 3 + 1];
                    let z = initialPositions[i * 3 + 2];

                    if (i < heartCount) {
                        // Latido constante del corazón morado
                        const pulse = 1 + Math.sin(elapsedTime * 3.8 + y * 0.04) * 0.07;
                        x *= pulse;
                        y *= pulse;
                        
                        x += Math.sin(elapsedTime * 4 + i) * 0.15;
                        y += Math.cos(elapsedTime * 4 + i) * 0.15;
                    } else {
                        // Movimiento del vacío cósmico
                        const speed = elapsedTime * 0.4;
                        if (i % 2 === 0) {
                            const tempX = x;
                            x = tempX * Math.cos(speed) - y * Math.sin(speed);
                            y = tempX * Math.sin(speed) + y * Math.cos(speed);
                        } else {
                            const tempX = x;
                            x = tempX * Math.cos(speed) - z * Math.sin(speed);
                            z = tempX * Math.sin(speed) + z * Math.cos(speed);
                        }
                    }

                    positionAttribute.setXYZ(i, x, y, z);
                }
                positionAttribute.needsUpdate = true;
                particleSystem.rotation.y = elapsedTime * 0.04;
            }

            // Fluidez de cámara adaptativa
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        animate();

        // --- Redimensionamiento Dinámico ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
    </script>
</body>
</html>
